<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <link rel="stylesheet" href="styles.css" /> 
        <script src="script.js" defer></script>
    </head>

    <body>
        <!-- Global navigation -->
        <nav class="site-nav">

          <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
            <span class="hamburger-bar"></span>
            <span class="hamburger-bar"></span>
            <span class="hamburger-bar"></span>
          </button>

          <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>

          </ul>

        </nav>

  <main class="contact-main">

    <h1 class="page-title contact-title">CONTACT US</h1>

    <div class="contact-page">
      <div class="contact-layout">

        <!-- LEFT COLUMN -->
        <section class="contact-info">

          <div class="contact-location">
            <p>London, UK</p>
            <p>2026</p>
          </div>

          <div class="contact-hours">
            <p>Office Hours</p>
            <p>Monday – Friday</p>
            <p>10am – 5pm</p>
          </div>

          <p class="email">contact@nowayy.co.uk</p>

         <div class="social-media">
            <a href="https://www.instagram.com/nowayypr?igsh=MWdldzd0cGs3dTg2bg==" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i> @nowayypr
           </a>
        </div>

        </section>

        <!-- RIGHT COLUMN -->
        <section class="contact-form-card">

          <form class="contact-form" name="contact" method="POST" data-netlify="true">
            <input type="hidden" name="form-name" value="contact" />
            <div class="form-grid">

              <div class="form-group">
                <label for="name">* Name</label>
                <input id="name" type="text" name="name" placeholder="Your name" required>
              </div>

              <div class="form-group">
                <label for="company">Company</label>
                <input id="company" type="text" name="company" placeholder="Your company">
              </div>

              <div class="form-group">
                <label for="email">* Email</label>
                <input id="email" type="email" name="email" placeholder="your@email.com" required>
              </div>

              <div class="form-group">
                <label for="phone">Phone</label>
                <input id="phone" type="tel" name="phone" placeholder="+44 7xxx xxx xxx">
              </div>

              <div class="form-group form-group--full">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Type your message"></textarea>
              </div>

              <button class="btn-send" type="submit">Send</button>

            </div>

          </form>

        </section>

      </div> <!-- contact-layout -->
    </div> <!-- contact-page -->

  </main>

  <footer class="site-footer">
        <p>Nowayy © </p>
    </footer>


</body>
</html>
